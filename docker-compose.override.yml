# =============================================================================
# DeepInspect Docker Compose - Development Override
# =============================================================================
# Usage: docker compose up (automatically merges with docker-compose.yml)
# This file provides development-specific overrides

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for faster iteration
    volumes:
      - ./backend:/app
      - /app/.venv  # Prevent local venv from overwriting container venv
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - DEMO_MODE=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent local node_modules from overwriting
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"

  redis:
    ports:
      - "6379:6379"
